<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>PharmaScan AsReader</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M4 7V4h16v3M9 20h6M12 4v16"/></svg>
        <h1>PharmaScan Pro</h1>
      </div>
      <p style="color:var(--primary);">ASR-020D ハードウェアスキャナ専用</p>
    </header>

    <main class="app-content">
      <!-- AsReader Input Panel -->
      <div id="input-panel" class="glass-card" style="margin-bottom: 20px;">
        <p style="margin-bottom: 16px; color: var(--text-main); font-weight: 600; font-size: 1.1rem; text-align: center;">AsReaderでバーコードを読み取ってください</p>
        
        <form id="scanner-form" onsubmit="return false;">
          <input type="text" id="barcode-input" placeholder="ここをタップしてスキャン待機状態にする" autocomplete="off" style="width: 100%; box-sizing: border-box; padding: 18px; font-size: 1.2rem; border-radius: 12px; border: 2px solid var(--primary); background: rgba(255, 255, 255, 0.1); color: #fff; text-align: center; outline: none; margin-bottom: 12px;" autofocus>
        </form>
        
        <p class="instruction" style="text-align: center; margin-top: 8px;">※カーソルが点滅している状態で AsReader の両サイドトリガーを押してください (DataBar Limited完全対応)</p>
      </div>

      <!-- Loading Panel -->
      <div id="loading-panel" class="glass-card hidden" style="margin-bottom: 20px;">
        <div class="loader-container">
          <div class="cube-loader">
            <div class="cube cube1"></div>
            <div class="cube cube2"></div>
            <div class="cube cube4"></div>
            <div class="cube cube3"></div>
          </div>
        </div>
        <p class="loading-text">データベース照会中...</p>
        <p class="scanned-code" id="loading-code-display"></p>
      </div>

      <!-- Manual Search Panel -->
      <div id="manual-search-panel" class="glass-card" style="margin-bottom: 20px;">
        <p style="margin-bottom: 12px; color: var(--text-main); font-weight: 600; font-size: 1rem;">薬品名 手動検索</p>
        <form id="text-search-form" style="display: flex; gap: 8px;">
          <input type="text" id="text-search-input" placeholder="薬品名の一部を入力 (ひらがな可)" autocomplete="off" style="flex:1; padding: 14px; font-size: 1.1rem; border-radius: 8px; border: 1px solid var(--primary); background: rgba(255,255,255,0.1); color: #fff; outline: none;">
          <button type="submit" id="text-search-btn" class="primary-btn" style="padding: 12px 16px; width: auto; min-width: 80px;">検索</button>
        </form>
      </div>

      <!-- Text Search List Results -->
      <div id="text-result-panel" class="glass-card hidden" style="margin-bottom: 20px;">
        <div class="result-header">
          <h2>手動検索結果</h2>
        </div>
        <div id="text-result-list" style="display: flex; flex-direction: column; gap: 12px; margin-top: 16px;">
          <!-- JS will populate items here -->
        </div>
      </div>

      <!-- Result Panel -->
      <div id="result-panel" class="glass-card hidden">
        <div class="result-header">
          <h2>検索結果</h2>
          <span id="res-status" class="status-badge success">取得成功</span>
        </div>
        
        <div class="data-group main-info">
          <div class="data-item full-width">
            <span class="label">商品名</span>
            <span class="value lg text-gradient" id="res-name">--</span>
          </div>
          <div class="data-item full-width">
            <span class="label">GS1 (GTIN)</span>
            <span class="value mono" id="res-gtin">--</span>
          </div>
        </div>

        <div class="data-grid">
          <div class="data-item">
            <span class="label">現在庫</span>
            <span class="value md" id="res-stock">--</span>
          </div>
          <div class="data-item">
            <span class="label">棚番</span>
            <span class="value md highlight" id="res-shelf">--</span>
          </div>
          <div class="data-item full-width">
            <span class="label">最終納品日</span>
            <span class="value" id="res-delivery">--</span>
          </div>
        </div>

        <button id="scan-again-btn" class="primary-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/></svg>
          続けてスキャン
        </button>
      </div>
    </main>
  </div>
  
  <script src="app.js"></script>
</body>
</html>
