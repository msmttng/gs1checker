<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>医薬品スキャナー (DataBar Limited完全対応版)</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/></svg>
        <h1>PharmaScan Pro</h1>
      </div>
      <p style="color:var(--primary);">PTPシート等 GS1 DataBar 対応</p>
    </header>

    <main class="app-content">
      <!-- Start Camera Panel -->
      <div id="start-panel" class="glass-card" style="text-align: center; margin-bottom: 20px;">
        <p style="margin-bottom: 16px; color: var(--text-main);">高精度カメラを起動してスキャンします</p>
        <button id="start-camera-btn" class="primary-btn">📸 カメラを起動</button>
      </div>

      <!-- Scanner Panel (Custom Video Player) -->
      <div id="scanner-panel" class="glass-card hidden" style="padding: 16px;">
        <div id="reader-container" style="position: relative; border-radius: 12px; overflow: hidden; background: #000; display: flex; justify-content: center; align-items: center; min-height: 250px;">
          <!-- ブラウザ標準のカメラストリームをここに流し込みます -->
          <video id="video-stream" playsinline autoplay muted style="width: 100%; height: auto; max-height: 60vh; object-fit: cover; display: block;"></video>
          
          <!-- カメラの上に描画する読み取りターゲット枠（赤線） -->
          <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; height: 80px; border: 2px solid rgba(255, 60, 60, 0.8); border-radius: 4px; pointer-events: none; box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);"></div>
        </div>
        <p class="instruction" style="margin-top: 16px; font-weight: 600; color: #fff;">赤い枠の中心にしっかり合わせてください</p>
      </div>

      <!-- Loading Panel -->
      <div id="loading-panel" class="glass-card hidden">
        <div class="loader-container">
          <div class="cube-loader">
            <div class="cube cube1"></div>
            <div class="cube cube2"></div>
            <div class="cube cube4"></div>
            <div class="cube cube3"></div>
          </div>
        </div>
        <p class="loading-text">データベース照会中...</p>
        <p class="scanned-code" id="loading-code-display"></p>
      </div>

      <!-- Result Panel -->
      <div id="result-panel" class="glass-card hidden">
        <div class="result-header">
          <h2>検索結果</h2>
          <span id="res-status" class="status-badge success">取得成功</span>
        </div>
        
        <div class="data-group main-info">
          <div class="data-item full-width">
            <span class="label">商品名</span>
            <span class="value lg text-gradient" id="res-name">--</span>
          </div>
          <div class="data-item full-width">
            <span class="label">GS1 (GTIN)</span>
            <span class="value mono" id="res-gtin">--</span>
          </div>
        </div>

        <div class="data-grid">
          <div class="data-item">
            <span class="label">現在庫</span>
            <span class="value md" id="res-stock">--</span>
          </div>
          <div class="data-item">
            <span class="label">棚番</span>
            <span class="value md highlight" id="res-shelf">--</span>
          </div>
          <div class="data-item full-width">
            <span class="label">最終納品日</span>
            <span class="value" id="res-delivery">--</span>
          </div>
        </div>

        <button id="scan-again-btn" class="primary-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/></svg>
          続けてスキャン
        </button>
      </div>
    </main>
  </div>
  
  <!-- ES Modulesでapp.jsを読み込む -->
  <script type="module" src="app.js"></script>
</body>
</html>
